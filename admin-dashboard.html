<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stackly | Advanced Fleet Control</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap");

      :root {
        --accent: #2563EB;
        --deep-charcoal: #0B1220;
        --sidebar-bg: #0B1220;
        --card-bg: #111111;
        --bg-body: #000000;
        --border: rgba(255, 255, 255, 0.08);
        --text-main: #F8FAFC;
        --text-muted: #94A3B8;
        --success: #2563EB;
        --warning: #f59e0b;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        background: var(--bg-body);
        color: var(--text-main);
        font-family: "Plus Jakarta Sans", sans-serif;
        display: flex;
        min-height: 100vh;
        overflow-x: hidden;
        width: 100%;
      }

      /* --- Sidebar --- */
      .sidebar {
        width: 280px;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        background: var(--sidebar-bg);
        color: #F8FAFC;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1001;
      }
      .sidebar-header {
        padding: 0 10px 40px;
        font-weight: 800;
        font-size: 1.4rem;
        letter-spacing: -1.5px;
      }
      .sidebar-header span {
        background: var(--accent);
        color: #F8FAFC;
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: 5px;
      }
      .sidebar ul {
        list-style: none;
        flex-grow: 1;
      }
      .sidebar li {
        padding: 14px 18px;
        margin-bottom: 8px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
        transition: 0.3s;
      }
      .sidebar li:hover,
      .sidebar li.active {
        background: rgba(37, 99, 235, 0.1);
        color: var(--accent);
      }

      .sidebar-footer {
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.3);
      }

      /* --- Main Layout --- */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--bg-body);
        position: relative;
        margin-left: 280px;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: rgba(11, 18, 32, 0.9);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        position: fixed;
        top: 0;
        left: 280px;
        right: 0;
        z-index: 1000;
        transition: var(--transition);
      }
      .content {
        padding: 120px 40px 40px;
        max-width: 1600px;
        margin: 0 auto;
        width: 100%;
        transition: 0.3s;
        box-sizing: border-box;
        flex: 1;
      }

      /* Mobile Header */
      .mobile-nav-toggle {
        display: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: #F8FAFC;
      }

      /* --- Typography & Elements --- */
      .section-header {
        margin-bottom: 30px;
      }
      .section-header h2 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -1px;
      }
      .section-header p {
        color: var(--text-muted);
        font-weight: 500;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 24px;
        margin-bottom: 40px;
      }
      .card {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 24px;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        transition: var(--transition);
        height: 100%;
      }
      .card:hover {
        border-color: var(--accent);
        box-shadow: 0 10px 25px rgba(37, 99, 235, 0.05);
        transform: translateY(-10px) scale(1.02);
      }
      .card i.trend-icon {
        position: absolute;
        right: 20px;
        top: 20px;
        font-size: 1.4rem;
        color: #F8FAFC;
        background: var(--accent);
        padding: 10px;
        border-radius: 12px;
      }
      .card .label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
      }
      .card .value {
        font-size: 1.8rem;
        font-weight: 800;
      }
      .card .trend {
        font-size: 0.8rem;
        font-weight: 700;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      /* --- Visual List --- */
      .visual-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
        gap: 20px;
      }
      .item-row {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 20px;
        border: 1px solid var(--border);
        transition: 0.3s;
      }
      .item-row:hover {
        border-color: var(--accent);
        transform: translateX(5px);
      }
      .item-img {
        width: 80px;
        height: 60px;
        border-radius: 12px;
        object-fit: cover;
      }
      .item-info h4 {
        font-weight: 800;
        font-size: 1.1rem;
      }

      /* --- Table Styles --- */
      .table-container {
        width: 100%;
        overflow-x: auto;
        background: var(--card-bg);
        border-radius: 24px;
        border: 1px solid var(--border);
        -webkit-overflow-scrolling: touch;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }
      th {
        text-align: left;
        padding: 18px 24px;
        background: rgba(255, 255, 255, 0.02);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
      }
      td {
        padding: 18px 24px;
        font-size: 0.9rem;
        font-weight: 600;
        border-top: 1px solid var(--border);
      }

      @media (max-width: 1024px) {
        .sidebar {
          position: fixed;
          left: -280px;
          top: 0;
          bottom: 0;
          box-shadow: 20px 0 50px rgba(11, 18, 32, 0.5);
        }
        .sidebar.active {
          left: 0;
        }
        .mobile-nav-toggle {
          display: block;
        }
        .navbar {
          left: 0;
          width: 100%;
          padding: 15px 20px;
        }
        .admin-user-info {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .grid-responsive-2-1 {
          grid-template-columns: 1fr !important;
        }
        .content {
          padding: 100px 25px 25px;
        }
      }

      @media (max-width: 600px) {
        .content {
          padding: 15px;
        }
        .section-header h2 {
          font-size: 1.6rem;
        }
        .cards {
          grid-template-columns: 1fr !important;
          gap: 15px;
        }
        .visual-list {
          grid-template-columns: 1fr !important;
        }
        #page-title {
          font-size: 0.8rem;
        }
        .navbar {
          padding: 12px 15px;
        }
        .grid-responsive-reports {
          grid-template-columns: 1fr !important;
        }
        .item-row {
          flex-direction: column;
          text-align: center;
        }
        .item-row i {
          margin-left: 0 !important;
        }
      }
    </style>
  </head>
