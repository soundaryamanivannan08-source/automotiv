<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Voltage Depletion</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        :root {
            --accent: #2563EB;
            --bg: #0B1220;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --error-red: #ff3e3e;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .error-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        /* --- Huge 404 Display --- */
        .error-code {
            font-size: clamp(8rem, 25vw, 15rem);
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #F8FAFC;
            line-height: 1;
            margin-bottom: 30px;
            letter-spacing: -5px;
        }

        /* --- Animated Engine as '0' --- */
        .Engine-loader {
            width: 1ch;
            height: 0.6em;
            border: 8px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            position: relative;
            padding: 8px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(37, 99, 235, 0.05);
        }

        .Engine-loader::after {
            content: '';
            position: absolute;
            right: -18px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 0 5px 5px 0;
        }

        .Service-fill {
            width: 0%;
            height: 100%;
            background: var(--error-red);
            border-radius: 5px;
            transition: 3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
            animation: Service-up 3s ease-in-out infinite;
        }

        @keyframes Service-up {
            0% { width: 5%; background: var(--error-red); box-shadow: 0 0 20px var(--error-red); }
            50% { width: 100%; background: var(--accent); box-shadow: 0 0 30px var(--accent); }
            80% { width: 100%; background: var(--accent); opacity: 1; }
            100% { width: 100%; opacity: 0; }
        }

        /* --- Content Detail --- */
        .content {
            opacity: 0;
            transform: translateY(20px);
            animation: fade-in 0.8s ease-out 0.5s forwards;
        }

        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1.5px; }
        p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 36px;
            background: var(--accent);
            color: #F8FAFC;
            text-decoration: none;
            font-weight: 800;
            border-radius: 100px;
            transition: var(--transition);
        }

        .btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2);
        }

        @keyframes fade-in {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(11, 18, 32, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .btn-errors {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="error-wrapper">
        <div class="error-code">
            <span>4</span>
            <div class="Engine-loader">
                <div class="Service-fill"></div>
            </div>
            <span>4</span>
        </div>

        <div class="content">
            <h1>Range Depleted.</h1>
            <p>Your NAV system failed to locate this destination. The page you're searching for is currently off-grid or has been decommissioned.</p>
            <div class="btn-errors" style="display: flex; gap: 10px; justify-content: center;  ">
                <a href="index.html" class="btn" style="text-align: center; justify-content: center;">
                <i class="ph ph-wrench"></i>
                Return to Home
            </a>
          <a href="javascript:history.back()" class="btn" style="text-align: center; justify-content: center;"> 
  <i class="ph ph-wrench"></i> Go Back 
</a>

            </div>

        </div>
    </div>

</body>
</html>
